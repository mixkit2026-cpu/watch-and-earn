<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Click</title><script src="https://cdn.tailwindcss.com"></script><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDmDsRoWWAA_P4msOZbRGna6f-BO7znPHM",
  authDomain: "watch-and-earn-2026.firebaseapp.com",
  projectId: "watch-and-earn-2026",
  storageBucket: "watch-and-earn-2026.firebasestorage.app",
  messagingSenderId: "620164694284",
  appId: "1:620164694284:web:bf2b45f35586ab60af0929"
};

// ✅ INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 Loader Fix
async function startApp() {
  try {
    const snap = await getDoc(doc(db, "config", "settings"));

    if (snap.exists()) {
      const data = snap.data();

      if (data.status === "active") {
        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";
      } else {
        alert("App disabled");
      }
    } else {
      alert("No config found");
    }
  } catch (e) {
    console.error(e);
  }
}

// Auth
signInAnonymously(auth);

// Run
startApp();
</script><style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}
button {
  padding:15px 25px;
  background:purple;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
}
</style></head><body><!-- LOADER --><div id="loading" class="center">

</div><!-- APP --><div id="app" class="center" style="display:none;">

</div></body>
