<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USDT Click - Ads Integrated</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='10914319' data-sdk='show_10914319'></script>
    
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .btn-ad { padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; transition: transform 0.2s; }
        .btn-ad:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-6">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">USDT Click</h1>
        <p class="text-gray-400">Watch Ads to Earn Rewards</p>
        <div class="mt-4 text-2xl font-bold text-amber-400">
            Coins: <span id="user-coins">0</span>
        </div>
    </div>

    <div class="w-full space-y-4 max-w-sm">
        <button id="watch-ad-btn" class="btn-ad bg-blue-600 hover:bg-blue-500">
            📺 Watch Ad (Monetag)
        </button>

        <button id="get-bonus-btn" class="btn-ad bg-purple-600 hover:bg-purple-500">
            🎁 Get Bonus (Adsgram)
        </button>
    </div>

    <p id="status-msg" class="mt-6 text-sm text-gray-500 italic">Ads will also show automatically every 10-20 seconds.</p>

    <script>
        // --- CONFIGURATION ---
        const ADSGRAM_BLOCK_ID = 'int-28567';
        let userCoins = 0;

        // --- ADSGRAM SETUP ---
        const AdController = window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID });

        function showAdsgram() {
            AdController.show().then((result) => {
                // User watched the ad fully
                rewardUser(500, "Adsgram Bonus Received!");
            }).catch((result) => {
                console.error("Adsgram Error or Skip:", result);
            });
        }

        // --- MONETAG SETUP ---
        function showMonetag() {
            if (typeof show_10914319 === 'function') {
                show_10914319().then(() => {
                    rewardUser(300, "Monetag Reward Received!");
                }).catch(e => {
                    console.warn("Monetag Ad Failed:", e);
                });
            }
        }

        // --- REWARD LOGIC ---
        function rewardUser(amount, message) {
            userCoins += amount;
            document.getElementById('user-coins').innerText = userCoins.toLocaleString();
            
            // Show Telegram Alert if available
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.showAlert(message);
            } else {
                alert(message);
            }
        }

        // --- EVENT LISTENERS ---
        document.getElementById('watch-ad-btn').addEventListener('click', showMonetag);
        document.getElementById('get-bonus-btn').addEventListener('click', showAdsgram);

        // --- AUTO AD LOOP (Continuous) ---
        // 10 Seconds Interval (Monetag)
        setInterval(() => {
            console.log("Auto-triggering Monetag...");
            showMonetag();
        }, 10000); 

        // 20 Seconds Interval (Adsgram)
        setInterval(() => {
            console.log("Auto-triggering Adsgram...");
            showAdsgram();
        }, 20000);

        // Initialize Telegram UI
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
