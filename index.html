<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch and Earn</title>
</head>
<body>

    <script src="/path/to/monetag/sdk.js"></script>
    <!-- ✨ REWARD ADS SYSTEM - 50 coins every 20 seconds -->
    <script>
        window.rewardAdManager = {
            zoneId: '10914319',
            adShownCount: 0,
            lastAdTime: 0,
            
            init: function() {
                console.log('🎬 Reward Ad System Started');
                this.scheduleAdInterval();
                setTimeout(() => this.showRewardAd(), 5000);
            },
            
            scheduleAdInterval: function() {
                setInterval(() => {
                    this.showRewardAd();
                }, 20000);
            },
            
            showRewardAd: function() {
                const now = Date.now();
                const timeSinceLastAd = now - this.lastAdTime;
                
                if (timeSinceLastAd < 15000) {
                    return;
                }
                
                try {
                    if (typeof window.show_10914319 === 'function') {
                        this.adShownCount++;
                        this.lastAdTime = now;
                        console.log('✅ Ad #' + this.adShownCount);
                        window.show_10914319();
                        setTimeout(() => this.awardRewardCoins(), 500);
                    }
                } catch (e) {
                    console.error('Error showing ad:', e);
                }
            },
            
            awardRewardCoins: function() {
                const rewardAmount = 50;
                try {
                    if (typeof window.updateGameState === 'function' && typeof window.gameState !== 'undefined') {
                        window.gameState.score += rewardAmount;
                        window.gameState.adCoinsEarned = (window.gameState.adCoinsEarned || 0) + rewardAmount;
                        window.updateGameState(window.gameState);
                        console.log('💰 +' + rewardAmount + ' coins');
                    }
                } catch (e) {
                    console.error('Error awarding coins:', e);
                }
            }
        };
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.rewardAdManager.init();
            });
        } else {
            window.rewardAdManager.init();
        }
    </script>

    <div id="show_10914319" style="display: none;"></div>

    <script src="/path/to/richads/sdk.js"></script>
</body>
</html>
